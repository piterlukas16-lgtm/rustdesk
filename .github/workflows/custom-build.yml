name: RustDesk Custom Client Build

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  RUST_VERSION: "1.75"
  MAC_RUST_VERSION: "1.81"
  CARGO_NDK_VERSION: "3.1.2"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  ANDROID_FLUTTER_VERSION: "3.24.5"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  NDK_VERSION: "r27c"
  VERSION: "1.4.6"

jobs:

  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-windows:
    name: Windows x64
    needs: [generate-bridge]
    runs-on: windows-2022
    steps:
      - name: Export cache env
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Patch server config
        shell: python
        env:
          MY_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          MY_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          import re, os, sys
          server = os.environ['MY_SERVER']
          key = os.environ['MY_KEY']
          path = 'libs/hbb_common/src/config.rs'
          text = open(path, encoding='utf-8').read()
          text = re.sub(
              r'(pub const RENDEZVOUS_SERVERS[^=]*=\s*&\[)[^\]]*(\];)',
              lambda m: m.group(1) + '"' + server + '",' + m.group(2),
              text, flags=re.DOTALL
          )
          text = re.sub(r'_ => ""', '_ => "' + key + '"', text)
          text = re.sub(
              r'(pub const RS_PUB_KEY:\s*&str\s*=\s*)"[^"]*"(;)',
              r'\g<1>"' + key + r'"\2',
              text
          )
          open(path, 'w', encoding='utf-8').write(text)
          for i, l in enumerate(text.splitlines(), 1):
              if 'RENDEZVOUS_SERVERS' in l or 'RS_PUB_KEY' in l or server in l:
                  print(f"{i}: {l}")

      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Replace Flutter engine
        run: |
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/* C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-2022

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg deps
        shell: bash
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          $VCPKG_ROOT/vcpkg install \
            --triplet x64-windows-static \
            --x-install-root="$VCPKG_ROOT/installed"

      - name: Build RustDesk
        run: python3 .\build.py --portable --hwcodec --flutter

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64
          path: |
            ./rustdesk-*.exe
            ./flutter/build/windows/x64/runner/Release/rustdesk.exe

  build-linux:
    name: Linux (${{ matrix.job.arch }})
    needs: [generate-bridge]
    runs-on: ${{ matrix.job.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - { arch: x86_64, target: x86_64-unknown-linux-gnu,   triplet: x64-linux,   runs-on: ubuntu-22.04          }
          - { arch: arm64,  target: aarch64-unknown-linux-gnu,   triplet: arm64-linux,  runs-on: ubuntu-22.04          }
    steps:
      - name: Export cache env
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set up QEMU (for arm64 cross-build)
        if: matrix.job.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Patch server config
        shell: python
        env:
          MY_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          MY_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          import re, os, sys
          server = os.environ['MY_SERVER']
          key = os.environ['MY_KEY']
          path = 'libs/hbb_common/src/config.rs'
          text = open(path, encoding='utf-8').read()
          text = re.sub(
              r'(pub const RENDEZVOUS_SERVERS[^=]*=\s*&\[)[^\]]*(\];)',
              lambda m: m.group(1) + '"' + server + '",' + m.group(2),
              text, flags=re.DOTALL
          )
          text = re.sub(r'_ => ""', '_ => "' + key + '"', text)
          text = re.sub(
              r'(pub const RS_PUB_KEY:\s*&str\s*=\s*)"[^"]*"(;)',
              r'\g<1>"' + key + r'"\2',
              text
          )
          open(path, 'w', encoding='utf-8').write(text)
          for i, l in enumerate(text.splitlines(), 1):
              if 'RENDEZVOUS_SERVERS' in l or 'RS_PUB_KEY' in l or server in l:
                  print(f"{i}: {l}")

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libunwind-dev nasm yasm
          sudo apt-get install -y \
            g++ gcc git curl wget \
            libgtk-3-dev clang \
            libxcb-randr0-dev libxdo-dev libxfixes-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libasound2-dev libpulse-dev cmake make \
            libclang-dev ninja-build \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libpam0g-dev zip unzip python3-pip

      - name: Install ARM64 cross-compiler
        if: matrix.job.arch == 'arm64'
        run: |
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu
          # Linker dla Rust cross-kompilacji
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Set cross-compile env (arm64 only)
        if: matrix.job.arch == 'arm64'
        run: |
          echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          echo "AR=aarch64-linux-gnu-ar" >> $GITHUB_ENV

      - name: Install LLVM (x86_64)
        if: matrix.job.arch == 'x86_64'
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install LLVM (arm64 via apt)
        if: matrix.job.arch == 'arm64'
        run: |
          sudo apt-get install -y clang-15 llvm-15 libclang-15-dev
          echo "LIBCLANG_PATH=/usr/lib/llvm-15/lib" >> $GITHUB_ENV
          echo "LLVM_CONFIG_PATH=/usr/bin/llvm-config-15" >> $GITHUB_ENV

      - name: Install Flutter (x86_64)
        if: matrix.job.arch == 'x86_64'
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Flutter (arm64 manual)
        if: matrix.job.arch == 'arm64'
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b ${{ env.FLUTTER_VERSION }} /opt/flutter
          echo "/opt/flutter/bin" >> $GITHUB_PATH
          /opt/flutter/bin/flutter precache --linux

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.job.target }}
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: linux-${{ matrix.job.arch }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg deps
        env:
          VCPKG_FORCE_SYSTEM_BINARIES: ${{ matrix.job.arch == 'arm64' && '1' || '' }}
        run: |
          $VCPKG_ROOT/vcpkg install \
            --triplet ${{ matrix.job.triplet }} \
            --x-install-root="$VCPKG_ROOT/installed"

      - name: Build RustDesk
        run: python3 build.py --hwcodec --flutter

      - name: Build deb package
        run: python3 build.py --hwcodec --flutter --skip-cargo --package deb

      - name: Build rpm package
        run: python3 build.py --hwcodec --flutter --skip-cargo --package rpm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux-${{ matrix.job.arch }}
          path: |
            ./rustdesk-*.deb
            ./rustdesk-*.rpm

  build-macos:
    name: macOS (${{ matrix.job.arch }})
    needs: [generate-bridge]
    runs-on: ${{ matrix.job.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - { arch: x86_64, target: x86_64-apple-darwin,  vcpkg-triplet: x64-osx,   runs-on: macos-13        }
          - { arch: arm64,  target: aarch64-apple-darwin,  vcpkg-triplet: arm64-osx,  runs-on: macos-14 }
    steps:
      - name: Export cache env
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Patch server config
        shell: python
        env:
          MY_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          MY_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          import re, os, sys
          server = os.environ['MY_SERVER']
          key = os.environ['MY_KEY']
          path = 'libs/hbb_common/src/config.rs'
          text = open(path, encoding='utf-8').read()
          text = re.sub(
              r'(pub const RENDEZVOUS_SERVERS[^=]*=\s*&\[)[^\]]*(\];)',
              lambda m: m.group(1) + '"' + server + '",' + m.group(2),
              text, flags=re.DOTALL
          )
          text = re.sub(r'_ => ""', '_ => "' + key + '"', text)
          text = re.sub(
              r'(pub const RS_PUB_KEY:\s*&str\s*=\s*)"[^"]*"(;)',
              r'\g<1>"' + key + r'"\2',
              text
          )
          open(path, 'w', encoding='utf-8').write(text)
          for i, l in enumerate(text.splitlines(), 1):
              if 'RENDEZVOUS_SERVERS' in l or 'RS_PUB_KEY' in l or server in l:
                  print(f"{i}: {l}")

      - name: Install deps
        run: brew install nasm yasm cmake ninja pkg-config

      - name: Install Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: ${{ matrix.job.target }}
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: macos-${{ matrix.job.arch }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg deps
        run: |
          $VCPKG_ROOT/vcpkg install \
            --triplet ${{ matrix.job.vcpkg-triplet }} \
            --x-install-root="$VCPKG_ROOT/installed"

      - name: Build RustDesk
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.14"
        run: |
          flutter config --enable-macos-desktop
          python3 build.py --flutter --hwcodec

      - name: Package macOS app
        run: |
          cd flutter/build/macos/Build/Products/Release
          zip -r RustDesk-${{ matrix.job.arch }}.zip RustDesk.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-macos-${{ matrix.job.arch }}
          path: ./flutter/build/macos/Build/Products/Release/RustDesk-${{ matrix.job.arch }}.zip

  build-android:
    name: Android arm64
    needs: [generate-bridge]
    runs-on: ubuntu-22.04
    steps:
      - name: Export cache env
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set up QEMU (for arm64 cross-build)
        if: matrix.job.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Patch server config
        shell: python
        env:
          MY_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          MY_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          import re, os, sys
          server = os.environ['MY_SERVER']
          key = os.environ['MY_KEY']
          path = 'libs/hbb_common/src/config.rs'
          text = open(path, encoding='utf-8').read()
          text = re.sub(
              r'(pub const RENDEZVOUS_SERVERS[^=]*=\s*&\[)[^\]]*(\];)',
              lambda m: m.group(1) + '"' + server + '",' + m.group(2),
              text, flags=re.DOTALL
          )
          text = re.sub(r'_ => ""', '_ => "' + key + '"', text)
          text = re.sub(
              r'(pub const RS_PUB_KEY:\s*&str\s*=\s*)"[^"]*"(;)',
              r'\g<1>"' + key + r'"\2',
              text
          )
          open(path, 'w', encoding='utf-8').write(text)
          for i, l in enumerate(text.splitlines(), 1):
              if 'RENDEZVOUS_SERVERS' in l or 'RS_PUB_KEY' in l or server in l:
                  print(f"{i}: {l}")

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libunwind-dev nasm yasm
          sudo apt-get install -y \
            g++ gcc git curl wget \
            libgtk-3-dev clang-15 libclang-15-dev cmake ninja-build \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            python3-pip zip
          echo "LIBCLANG_PATH=/usr/lib/llvm-15/lib" >> $GITHUB_ENV
          echo "LLVM_CONFIG_PATH=/usr/bin/llvm-config-15" >> $GITHUB_ENV

      - name: Install Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.ANDROID_FLUTTER_VERSION }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          local-cache: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android
          components: rustfmt

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version ${{ env.CARGO_NDK_VERSION }} --locked

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: android-arm64

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg deps
        run: |
          $VCPKG_ROOT/vcpkg install \
            --triplet arm64-android \
            --x-install-root="$VCPKG_ROOT/installed"

      - name: Patch Kotlin version
        run: |
          SETTINGS="flutter/android/settings.gradle"
          # Kotlin 2.0.20 = kompatybilny z Flutter 3.24.x i AGP 7.3.1
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "2.0.20"/g' "$SETTINGS"
          echo "=== settings.gradle PO ==="
          grep -n "kotlin" "$SETTINGS" || true

      - name: Build APK
        run: |
          cd flutter
          flutter pub get
          flutter build apk --release --target-platform android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-android-arm64
          path: ./flutter/build/app/outputs/flutter-apk/app-release.apk